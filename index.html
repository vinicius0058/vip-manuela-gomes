<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Manuela Gomes 🔥</title>

<style>
body {
  margin:0;
  font-family: Arial;
  background:#0a0a0a;
  color:#fff;
}

/* HEADER */
.header {
  display:flex;
  align-items:center;
  gap:12px;
  padding:15px;
  border-bottom:1px solid #222;
}

.avatar {
  width:55px;
  height:55px;
  border-radius:50%;
  background:url('https://via.placeholder.com/150') center/cover;
}

.info h1 {
  font-size:16px;
  margin:0;
}

.info p {
  margin:0;
  color:#aaa;
  font-size:13px;
}

/* STATS */
.stats {
  display:flex;
  justify-content:space-around;
  padding:15px;
  border-bottom:1px solid #222;
}

.stats div {
  font-size:14px;
}

.stats span {
  display:block;
  font-weight:bold;
}

/* GRID */
.grid {
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:4px;
}

.grid div {
  position:relative;
}

.grid img {
  width:100%;
  height:120px;
  object-fit:cover;
  filter:blur(8px);
}

.grid div::after {
  content:"🔒";
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  font-size:20px;
}

/* CTA FIXO */
.cta {
  position:fixed;
  bottom:0;
  width:100%;
  background:#111;
  padding:15px;
  border-top:1px solid #222;
}

.btn {
  background:linear-gradient(45deg,#ff0055,#ff3388);
  padding:15px;
  border-radius:30px;
  color:#fff;
  text-align:center;
  font-weight:bold;
  text-decoration:none;
  display:block;
}

/* ONLINE */
.online {
  color:#00ff99;
  font-size:13px;
  text-align:center;
  margin-top:10px;
}

/* POPUP */
.popup {
  position:fixed;
  bottom:80px;
  left:10px;
  background:#141414;
  padding:10px 15px;
  border-radius:10px;
  font-size:13px;
  display:none;
  animation:fade 0.5s;
}

@keyframes fade {
  from {opacity:0; transform:translateY(20px);}
  to {opacity:1; transform:translateY(0);}
}
</style>

<script>
function onlineFake(){
  let n = Math.floor(Math.random()*30)+20;
  document.getElementById("online").innerText =
    n + " pessoas online agora";
}

function popupFake(){
  let nomes = ["Carlos","João","Lucas","Pedro","Rafael"];
  let cidade = ["SP","RJ","RS","MG"];
  let nome = nomes[Math.floor(Math.random()*nomes.length)];
  let cid = cidade[Math.floor(Math.random()*cidade.length)];

  let p = document.getElementById("popup");
  p.innerText = nome + " ("+cid+") entrou agora 🔥";
  p.style.display="block";

  setTimeout(()=>{p.style.display="none";},3000);
}

setInterval(onlineFake,3000);
setInterval(popupFake,5000);
</script>

</head>

<body>

<div class="header">
  <div class="avatar"></div>
  <div class="info">
    <h1>Manuela Gomes 🔥</h1>
    <p>34 • Santa Maria RS</p>
  </div>
</div>

<div class="stats">
  <div><span>124</span>posts</div>
  <div><span>8.3k</span>seguidores</div>
  <div><span>92</span>seguindo</div>
</div>

<div class="online" id="online">...</div>

<div class="grid">
  <div><img src="https://via.placeholder.com/300x400"></div>
  <div><img src="https://via.placeholder.com/300x400"></div>
  <div><img src="https://via.placeholder.com/300x400"></div>
  <div><img src="https://via.placeholder.com/300x400"></div>
  <div><img src="https://via.placeholder.com/300x400"></div>
  <div><img src="https://via.placeholder.com/300x400"></div>
</div>

<div class="popup" id="popup"></div>

<div class="cta">
  <a class="btn" href="https://pay.kiwify.com.br/M0VffCG" target="_blank">
    🔥 ACESSAR CONTEÚDO VIP R$9,90
  </a>
</div>

</body>
</html>
